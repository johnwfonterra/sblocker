# /etc/dnsmasq.d/netgate.conf
# DHCP + DNS configuration for LAN interface

# Only listen on LAN
interface=eth1
bind-interfaces

# DHCP range
dhcp-range=192.168.10.50,192.168.10.200,24h

# Gateway = this device
dhcp-option=3,192.168.10.1

# DNS = this device (for DNS-level blocking)
dhcp-option=6,192.168.10.1

# Upstream DNS (used for non-blocked queries)
server=1.1.1.1
server=9.9.9.9

# Block list file (generated by netgate)
addn-hosts=/etc/netgate/blocked-hosts

# Log queries for stats
log-queries
log-facility=/var/log/netgate/dns.log
